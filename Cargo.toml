[package]
name = "maym"
version = "0.1.0"
edition = "2021"
rust-version = "1.72.1"

[dependencies]
camino = { version = "1.1.7", features = ["serde1"] }
clap = { version = "4.4.18", features = ["derive"] }
color-eyre = { version = "0.6.3", default-features = false, features = ["track-caller"] }
crossterm = "0.27.0"
dirs = "5.0.1"
id3 = { version = "1.13.1", default-features = false }
itertools = "0.13.0"
libmpv = { git = "https://github.com/ParadoxSpiral/libmpv-rs", version = "2.0.1" }
may-clack = "0.5.8"
once_cell = "1.19.0"
owo-colors = "4.0.0"
rand = "0.8.5"
ratatui = "0.27.0"
serde = "1.0.203"
serde_json = "1.0.118"
shadow-rs = { version = "0.29.0", default-features = false }
thiserror = "1.0.61"
unicase = "2.7.0"

[build-dependencies]
shadow-rs = { version = "0.29.0", default-features = false, features = ["git2"] }
