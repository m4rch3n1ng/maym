[package]
name = "maym"
version = "0.1.0"
edition = "2021"
rust-version = "1.72.1"

[dependencies]
camino = { version = "1.1.7", features = ["serde1"] }
color-eyre = { version = "0.6.3", default-features = false, features = ["track-caller"] }
cpal = { version = "0.15.3", default-features = false }
creek = { version = "1.2.2", default-features = false, features = ["decode", "decode-mp3"] }
crossterm = "0.27.0"
dirs = "5.0.1"
id3 = { version = "1.13.1", default-features = false }
itertools = "0.13.0"
once_cell = "1.19.0"
rand = "0.8.5"
ratatui = "0.27.0"
rtrb = "0.3.1"
rubato = { version = "0.15.0", default-features = false }
serde = "1.0.203"
serde_json = "1.0.118"
thiserror = "1.0.61"
unicase = "2.7.0"
